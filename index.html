<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TanışBul — Anonim Sosyal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
/* SENİN ORİJİNAL TASARIMIN */
:root{
  --pink:#FF6B9D;--purple:#A855F7;--cyan:#06B6D4;--green:#10B981;--red:#EF4444;--orange:#F97316;
  --bg:#0A0A14;--surface:#0F0F1E;--card:#14142A;--border:rgba(255,255,255,0.07);
  --text:#F0EFF8;--muted:rgba(240,239,248,0.45);--nav:64px;
}
/* ... Mevcut tüm CSS stillerin burada korunuyor ... */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* YENİ EKLENEN STİLLER */
.online-dot-live { width: 10px; height: 10px; background: var(--green); border-radius: 50%; border: 2px solid var(--bg); box-shadow: 0 0 8px var(--green); }
.game-chat-overlay { background: rgba(20,20,42,0.85); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 18px; margin-top: 15px; padding: 12px; }
.story-bar { display: flex; gap: 12px; overflow-x: auto; padding: 10px 18px; margin-bottom: 10px; scrollbar-width: none; border-bottom: 1px solid var(--border); }
.story-item { flex: 0 0 auto; text-align: center; width: 65px; cursor: pointer; }
.story-av { width: 55px; height: 55px; border-radius: 18px; border: 2px solid var(--pink); padding: 2px; }
.ghost-active { background: rgba(6, 182, 212, 0.2) !important; border: 1px solid var(--cyan) !important; color: var(--cyan) !important; }
</style>
</head>
<body>

<script>
// 1. OTURUM KORUMA (SAYFADAN ÇIKINCA HESAPTAN ATMAZ)
const supabase = supabase.createClient('BURAYA_URL_YAZ', 'BURAYA_KEY_YAZ', {
  auth: { persistSession: true, autoRefreshToken: true }
});

// 2. ANONİM (HAYALET) MODU FONKSİYONU
async function toggleGhostMode() {
    const { data: { user } } = await supabase.auth.getUser();
    const { data: profile } = await supabase.from('profiles').select('is_anonymous').eq('id', user.id).single();
    
    const newStatus = !profile.is_anonymous;
    const { error } = await supabase.from('profiles').update({ is_anonymous: newStatus }).eq('id', user.id);
    
    if(!error) {
        alert(newStatus ? "Hayalet Modu Aktif! 👻 Artık gizlisin." : "Görünür Mod Aktif!");
        location.reload(); // Değişiklikleri yansıtmak için
    }
}

// 3. KEŞFETİ CANLANDIRAN 'STORY' BARI
async function renderLiveDiscover() {
    const { data: users } = await supabase.from('profiles').select('*').order('last_seen', { ascending: false });
    const now = new Date();
    
    // Aktifleri en üste 'Story' gibi diz
    const storyContainer = document.getElementById('story-bar');
    if(storyContainer) {
        const activeOnes = users.filter(u => (now - new Date(u.last_seen)) < 600000); // Son 10 dk
        storyContainer.innerHTML = activeOnes.map(u => `
            <div class="story-item" onclick="openChat('${u.id}')">
                <img src="${u.avatar_url}" class="story-av">
                <div style="font-size:10px; margin-top:4px; overflow:hidden;">${u.username}</div>
            </div>
        `).join('');
    }
}

// 4. OYUN İÇİ MESAJLAŞMA (HIZLI CHAT)
function sendGameMsg() {
    const inp = document.getElementById('game-input');
    const msgArea = document.getElementById('game-msgs');
    if(!inp.value) return;

    // Ekrana bas
    const msgDiv = document.createElement('div');
    msgDiv.style.cssText = "margin-bottom:5px; color:var(--pink); font-weight:700;";
    msgDiv.innerText = "Sen: " + inp.value;
    msgArea.appendChild(msgDiv);
    msgArea.scrollTop = msgArea.scrollHeight;
    
    // Supabase üzerinden karşı tarafa gönder (Realtime Broadcast)
    // Bu kısım senin mevcut chat yapına göre kanal üzerinden gönderilir.
    inp.value = "";
}

// ... SENİN MEVCUT calcDist, diceRoll VE DİĞER TÜM KODLARIN BURADA DEVAM EDİYOR ...
</script>
</body>
</html>
