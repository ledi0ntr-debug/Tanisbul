<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ArkadaşBul 🌈</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --purple: #A855F7;
    --blue: #3B82F6;
    --cyan: #06B6D4;
    --yellow: #FBBF24;
    --orange: #F97316;
    --green: #10B981;
    --red: #EF4444;
    --bg: #0F0F1A;
    --card: #1A1A2E;
    --card2: #16213E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    color: white;
  }

  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: floatBlob 8s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .blob1 { width: 300px; height: 300px; background: var(--pink); top: -50px; left: -100px; }
  .blob2 { width: 250px; height: 250px; background: var(--purple); bottom: -50px; right: -80px; animation-delay: 3s; }
  .blob3 { width: 200px; height: 200px; background: var(--cyan); top: 50%; left: 50%; animation-delay: 1.5s; }

  @keyframes floatBlob {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(20px,-20px) scale(1.1); }
  }

  /* Phone */
  .phone {
    width: 390px;
    min-height: 844px;
    background: var(--bg);
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.08);
    overflow: hidden;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 60px rgba(168,85,247,0.2), 0 0 120px rgba(255,107,157,0.1);
  }

  /* ── AUTH SCREEN ── */
  .auth-screen {
    min-height: 844px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    gap: 24px;
  }

  .auth-logo {
    font-family: 'Pacifico', cursive;
    font-size: 42px;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }
  .auth-subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 15px;
    text-align: center;
    margin-top: -16px;
  }

  .auth-tabs {
    display: flex;
    background: var(--card);
    border-radius: 16px;
    padding: 4px;
    width: 100%;
  }
  .auth-tab {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    color: rgba(255,255,255,0.5);
  }
  .auth-tab.active {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    box-shadow: 0 4px 12px rgba(255,107,157,0.3);
  }

  .auth-form { width: 100%; display: flex; flex-direction: column; gap: 14px; }

  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.7); }
  .input-field {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: white;
    outline: none;
    transition: border-color 0.3s;
    width: 100%;
  }
  .input-field:focus { border-color: var(--purple); }
  .input-field::placeholder { color: rgba(255,255,255,0.3); }

  .btn-main {
    padding: 16px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border: none;
    border-radius: 16px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,107,157,0.4);
    width: 100%;
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,107,157,0.5); }
  .btn-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .auth-error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: #FF8080;
    text-align: center;
    display: none;
  }
  .auth-success {
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--green);
    text-align: center;
    display: none;
  }

  /* ── PROFILE SETUP ── */
  .profile-setup {
    min-height: 844px;
    display: flex;
    flex-direction: column;
    padding: 40px 32px;
    gap: 20px;
  }
  .setup-title {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .setup-sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: -12px; }

  .avatar-picker {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .avatar-opt {
    width: 52px; height: 52px;
    border-radius: 16px;
    background: var(--card);
    border: 2px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .avatar-opt.selected {
    border-color: var(--pink);
    background: rgba(255,107,157,0.15);
    transform: scale(1.1);
  }

  .interest-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .interest-chip {
    padding: 8px 16px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    background: var(--card);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: rgba(255,255,255,0.6);
  }
  .interest-chip.selected {
    border-color: var(--purple);
    background: rgba(168,85,247,0.2);
    color: white;
  }

  /* ── MAIN APP ── */
  .app-screen { min-height: 844px; display: flex; flex-direction: column; }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
  }

  .header {
    padding: 8px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    background: linear-gradient(135deg, var(--pink), var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-right { display: flex; gap: 10px; align-items: center; }
  .icon-btn {
    width: 42px; height: 42px;
    border-radius: 14px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
  }
  .icon-btn:hover { border-color: rgba(168,85,247,0.4); }
  .notif-dot {
    position: absolute; top: 8px; right: 8px;
    width: 8px; height: 8px;
    background: var(--pink); border-radius: 50%;
    border: 2px solid var(--bg);
  }

  .search-wrap { padding: 0 24px 20px; }
  .search-bar {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
  }

  .categories { padding: 0 24px 24px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
  .categories::-webkit-scrollbar { display: none; }
  .cat-pill {
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
  }
  .cat-pill.active {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,157,0.4);
  }
  .cat-pill:not(.active) {
    background: var(--card);
    color: rgba(255,255,255,0.6);
    border-color: rgba(255,255,255,0.08);
  }

  .section-title {
    padding: 0 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title h2 { color: white; font-size: 18px; font-weight: 800; }
  .section-title span { color: var(--purple); font-size: 13px; font-weight: 700; cursor: pointer; }

  .featured-scroll {
    padding: 0 24px 24px;
    display: flex;
    gap: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .featured-scroll::-webkit-scrollbar { display: none; }

  .feat-card {
    min-width: 160px;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .feat-avatar-placeholder {
    width: 160px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
  }
  .feat-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 40px 14px 14px;
  }
  .feat-name { color: white; font-size: 15px; font-weight: 800; }
  .feat-info { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }
  .feat-badge {
    position: absolute;
    top: 12px; right: 12px;
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 800;
    color: white;
  }
  .online-dot {
    position: absolute;
    top: 12px; left: 12px;
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 8px var(--green);
  }

  .people-list { padding: 0 24px; display: flex; flex-direction: column; gap: 12px; }

  .person-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .person-card:hover {
    transform: translateX(4px);
    border-color: rgba(168,85,247,0.3);
  }
  .person-avatar {
    width: 54px; height: 54px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    position: relative;
  }
  .person-avatar .status {
    position: absolute; bottom: 2px; right: 2px;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--card);
  }
  .status.online { background: var(--green); }

  .person-info { flex: 1; }
  .person-name { color: white; font-weight: 800; font-size: 15px; }
  .person-bio { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 3px; }
  .person-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tag {
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    color: white;
  }

  .connect-btn {
    width: 38px; height: 38px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .connect-btn:hover { transform: scale(1.1); }
  .connect-btn.add {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    box-shadow: 0 4px 12px rgba(255,107,157,0.4);
  }
  .connect-btn.added {
    background: var(--card2);
    border: 2px solid var(--green);
  }

  /* Profile page */
  .profile-page {
    min-height: 844px;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 20px;
  }
  .profile-header { text-align: center; padding: 20px 0; }
  .profile-big-avatar {
    width: 90px; height: 90px;
    border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    margin: 0 auto 14px;
    background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(168,85,247,0.2));
    border: 2px solid rgba(255,107,157,0.3);
  }
  .profile-name { font-size: 22px; font-weight: 800; }
  .profile-email { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 4px; }

  .profile-stats {
    display: flex;
    gap: 12px;
  }
  .pstat {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 14px;
    text-align: center;
  }
  .pstat-val { font-size: 22px; font-weight: 800; }
  .pstat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }

  .profile-section { background: var(--card); border-radius: 20px; padding: 18px; }
  .profile-section-title { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.7); margin-bottom: 12px; }

  .logout-btn {
    padding: 16px;
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 16px;
    color: #FF8080;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-top: 8px;
  }
  .logout-btn:hover { background: rgba(239,68,68,0.25); }

  /* Bottom nav */
  .bottom-nav {
    margin-top: auto;
    padding: 16px 24px 30px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; cursor: pointer;
  }
  .nav-icon {
    width: 50px; height: 50px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: all 0.3s;
  }
  .nav-item.active .nav-icon {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    box-shadow: 0 4px 15px rgba(255,107,157,0.4);
  }
  .nav-item:not(.active) .nav-icon { background: var(--card); }
  .nav-label { font-size: 11px; font-weight: 700; }
  .nav-item.active .nav-label { color: var(--pink); }
  .nav-item:not(.active) .nav-label { color: rgba(255,255,255,0.4); }

  /* Match popup */
  .match-popup {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: linear-gradient(135deg, #1A1A2E, #16213E);
    border: 2px solid rgba(255,107,157,0.4);
    border-radius: 32px;
    padding: 32px 28px;
    text-align: center;
    z-index: 100;
    width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .match-popup.show { transform: translate(-50%, -50%) scale(1); }
  .match-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 99;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    border-radius: 48px;
  }
  .match-overlay.show { opacity: 1; pointer-events: all; }
  .match-emoji { font-size: 60px; }
  .match-title {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    background: linear-gradient(135deg, var(--pink), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 10px 0 6px;
  }
  .match-sub { color: rgba(255,255,255,0.6); font-size: 14px; }
  .match-actions { display: flex; gap: 12px; margin-top: 20px; }
  .match-btn {
    flex: 1; padding: 14px;
    border-radius: 16px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .match-btn.primary {
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
  }
  .match-btn.secondary {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
  }

  /* Loading */
  .loading-screen {
    min-height: 844px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .spinner {
    width: 50px; height: 50px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 20px;
    animation: sparkleAnim 0.8s ease forwards;
  }
  @keyframes sparkleAnim {
    0% { opacity: 1; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg) translateY(-40px); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.4s ease forwards; }
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<div class="phone" id="app">
  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <div style="font-family:'Pacifico',cursive;font-size:36px;background:linear-gradient(135deg,#FF6B9D,#A855F7,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">ArkadaşBul</div>
    <div class="spinner"></div>
  </div>
</div>

<script>
// ── Supabase Init ──
const SUPABASE_URL = 'https://snbqilkkysxmzmjfsihf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HJ2nnuGyTszm7q_2y40KDQ_GZrSUenq';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    autoRefreshToken: true,
    persistSession: true,
    detectSessionInUrl: true
  }
});

let currentUser = null;
let currentProfile = null;
let activeTab = 'home';

const avatars = ['👩‍🎨','🧑‍💻','👩‍🎤','🧑‍🍳','👩‍🚀','🧑‍🎸','👩‍🔬','🧑‍🎓','👩‍💼','🧑‍🏋️'];
const interests = ['🎮 Oyun','🎵 Müzik','📚 Kitap','✈️ Seyahat','🏃 Spor','🎨 Sanat','🍳 Yemek','📸 Fotoğraf','🎬 Film','💻 Teknoloji'];

let realUsers = [];
let myFriendships = [];
let activeMessages = null; // currently open chat

// ── Init ──
async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadProfile();
  } else {
    showAuth();
  }
}

async function loadProfile() {
  const { data } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = data;
  if (!currentProfile || !currentProfile.username) {
    showProfileSetup();
  } else {
    await loadUsers();
    showApp();
  }
}

async function loadUsers() {
  const { data: users } = await db.from('profiles').select('*').neq('id', currentUser.id);
  realUsers = users || [];
  const { data: friendships } = await db.from('friendships').select('*')
    .or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);
  myFriendships = friendships || [];
}

function isFriend(userId) {
  return myFriendships.some(f =>
    (f.sender_id === userId || f.receiver_id === userId) && f.status === 'accepted'
  );
}

function isPending(userId) {
  return myFriendships.some(f =>
    f.sender_id === currentUser.id && f.receiver_id === userId && f.status === 'pending'
  );
}

// ── AUTH ──
function showAuth() {
  document.getElementById('app').innerHTML = `
    <div class="auth-screen fade-in">
      <div class="auth-logo">ArkadaşBul</div>
      <div class="auth-subtitle">Yeni arkadaşlar keşfet 🌈</div>
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Giriş Yap</div>
        <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Kayıt Ol</div>
      </div>
      <div class="auth-form">

        </div>

let authMode = 'login';
function switchAuthTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-register').classList.toggle('active', mode === 'register');
  document.getElementById('nameGroup').style.display = mode === 'register' ? 'flex' : 'none';
  document.getElementById('authBtn').textContent = mode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
}

async function handleAuth() {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const btn = document.getElementById('authBtn');
  const errEl = document.getElementById('authError');
  const sucEl = document.getElementById('authSuccess');

  if (!email || !pass) { showError('Lütfen tüm alanları doldur!'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ Bekle...';
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (authMode === 'login') {
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    if (error) { showError(getErrorMsg(error)); btn.disabled = false; btn.textContent = 'Giriş Yap'; return; }
    currentUser = data.user;
    await loadProfile();
  } else {
    const { data, error } = await db.auth.signUp({ email, password: pass });
    if (error) { showError(getErrorMsg(error)); btn.disabled = false; btn.textContent = 'Kayıt Ol'; return; }
    sucEl.textContent = '✅ Kayıt başarılı! E-postanı onaylaman gerekebilir.';
    sucEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Kayıt Ol';
    if (data.user) { currentUser = data.user; await loadProfile(); }
  }
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}

function getErrorMsg(error) {
  if (error.message.includes('Invalid login')) return 'E-posta veya şifre hatalı!';
  if (error.message.includes('already registered')) return 'Bu e-posta zaten kayıtlı!';
  if (error.message.includes('password')) return 'Şifre en az 6 karakter olmalı!';
  return error.message;
}

  selectedAvatar = emoji;
  document.querySelectorAll('.avatar-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');

function toggleInterest(interest, el) {
  if (el.classList.contains('selected')) {
    selectedInterests = selectedInterests.filter(i => i !== interest);
    el.classList.remove('selected');
  } else {
    selectedInterests.push(interest);
    el.classList.add('selected');
  }
}

async function saveProfile() {
  const username = document.getElementById('usernameInput').value.trim();
  const city = document.getElementById('cityInput').value.trim();
  const age = document.getElementById('ageInput').value;
  const bio = document.getElementById('bioInput').value.trim();

  if (!username || !city || !age) {
    document.getElementById('setupError').textContent = '❌ Lütfen tüm alanları doldur!';
    document.getElementById('setupError').style.display = 'block';
    return;
  }
  if (selectedInterests.length < 2) {
    document.getElementById('setupError').textContent = '❌ En az 2 ilgi alanı seç!';
    document.getElementById('setupError').style.display = 'block';
    return;
  }

  const { error } = await db.from('profiles').upsert({
    id: currentUser.id,
    email: currentUser.email,
    username, city, age: parseInt(age), bio,
    avatar: selectedAvatar,
    interests: selectedInterests,
    created_at: new Date().toISOString()
  });

  if (error) {
    document.getElementById('setupError').textContent = '❌ Hata: ' + error.message;
    document.getElementById('setupError').style.display = 'block';
    return;
  }

  currentProfile = { username, city, age, bio, avatar: selectedAvatar, interests: selectedInterests };
  showApp();
}

async function sendFriendRequest(receiverId, name, btn) {
  if (!btn || btn.classList.contains('added')) return;
  btn.disabled = true;
  btn.textContent = '⏳';
  btn.classList.remove('add');
  btn.classList.add('added');

  const { error } = await db.from('friendships').insert({
    sender_id: currentUser.id,
    receiver_id: receiverId,
    status: 'pending'
  });

  if (error) {
    btn.textContent = '❌';
    return;
  }

  // sparkles
  const sparkles = ['✨','🌟','💫','⭐'];
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = sparkles[i % 4];
    const rect = btn.getBoundingClientRect();
    const phone = document.querySelector('.phone').getBoundingClientRect();
    s.style.left = (rect.left - phone.left + Math.random()*60-20)+'px';
    s.style.top = (rect.top - phone.top + Math.random()*40-20)+'px';
    document.querySelector('.phone').appendChild(s);
    setTimeout(() => s.remove(), 800);
  }

  await loadUsers();
  setTimeout(() => showMatchPopup(name), 400);
}

async function sendMessage(receiverId) {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';

  await db.from('messages').insert({
    sender_id: currentUser.id,
    receiver_id: receiverId,
    content
  });

  if (activeMessages) {
    await renderChat(activeMessages.userId, activeMessages.username, activeMessages.avatar);
  }
}

async function logout() {
  await db.auth.signOut();
  currentUser = null;
  currentProfile = null;
  showAuth();
}

// Start
init();
</script>
